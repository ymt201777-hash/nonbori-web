const container = document.getElementById('svg-container');
container.innerHTML = SVG_SRC;
const svg_el = container.querySelector('svg');
const allEls = Array.from(svg_el.children).filter(el => el.tagName !== 'defs');

function getBBox(el) {
  try { return el.getBBox(); } catch(e) { return {x:0,y:0,width:10,height:10}; }
}
function rand(min, max) { return min + Math.random() * (max - min); }

function scatter(instant) {
  allEls.forEach(el => {
    const bbox = getBBox(el);
    const cx = bbox.x + bbox.width / 2;
    const cy = bbox.y + bbox.height / 2;
    const tx = rand(-300, 500);
    const ty = rand(-300, 400);
    const rot = rand(-180, 180);
    const scale = rand(0.3, 1.2);
    const dur = instant ? 0 : rand(0.4, 0.8);
    const delay = instant ? 0 : rand(0, 0.3);
    el.style.transformOrigin = cx + 'px ' + cy + 'px';
    el.style.transition = instant ? 'none' : 'transform ' + dur + 's cubic-bezier(.4,0,.6,1) ' + delay + 's, opacity ' + dur + 's ease ' + delay + 's';
    el.style.opacity = '0';
    el.style.transform = 'translate(' + tx + 'px, ' + ty + 'px) rotate(' + rot + 'deg) scale(' + scale + ')';
  });
}

function assemble() {
  allEls.forEach(el => {
    const bbox = getBBox(el);
    const cx = bbox.x + bbox.width / 2;
    const cy = bbox.y + bbox.height / 2;
    el.style.transformOrigin = cx + 'px ' + cy + 'px';
    const delay = rand(0.05, 0.6);
    const dur = rand(0.5, 0.9);
    el.style.transition = 'transform ' + dur + 's cubic-bezier(.2,.8,.3,1) ' + delay + 's, opacity ' + (dur * 0.6) + 's ease ' + delay + 's';
    el.style.opacity = '1';
    el.style.transform = 'translate(0,0) rotate(0deg) scale(1)';
  });
}

function replay() {
  scatter(false);
  setTimeout(assemble, 900);
}

scatter(true);
setTimeout(assemble, 200);

document.getElementById('btn-replay').addEventListener('click', replay);
document.getElementById('btn-scatter').addEventListener('click', function() { scatter(false); });
</script>
