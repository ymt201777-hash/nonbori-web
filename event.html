<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVENT | NONBORI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <nav class="nav-links">
      <a href="event.html"><img src="nav-event.svg" alt="EVENT"></a>
      <a href="about.html"><img src="nav-aboutus.svg" alt="ABOUT US"></a>
      <a href="contact.html"><img src="nav-contact.svg" alt="CONTACT"></a>
    </nav>
    <a href="https://www.instagram.com/nonbori_official" class="nav-instagram" target="_blank" rel="noopener noreferrer">
      <img src="nav-instagram.svg" alt="Instagram">
    </a>
  </header>

  <main>
    <div class="event-page-section">

      <!-- ===== NEW!! ===== -->
      <img class="event-page-heading" src="event-heading-new.svg" alt="NEW!!">

      <div class="new-event-wrap">
        <!-- ASOBO! メインカード -->
        <div class="new-event-card">
          <div class="card-image">
            <img src="event-asoboi-card.svg" alt="ASOBO!">
          </div>
          <div class="card-body">
            <p class="event-type-badge">ファミリー向け</p>
            <p class="event-date">2026年10月4日（日）</p>
            <p class="event-venue">@みんなの森 ぎふメディアコスモス</p>
            <p class="event-tags">子供服 , ワークショップ , フードトラック</p>
          </div>
          <div class="card-footer">
            <a href="contact.html" class="btn">詳細・申し込み</a>
          </div>
        </div>

        <!-- coming soon プレースホルダー -->
        <div class="coming-soon-placeholder">
          <p>coming soon...</p>
        </div>
      </div>

      <!-- ===== UPCOMING ===== -->
      <img class="upcoming-heading" src="event-upcoming-oval.svg" alt="UPCOMING">

      <div class="upcoming-events">

        <!-- 正解のない選び方 -->
        <div class="upcoming-card">
          <div class="uc-left">
            <p class="uc-type">トークイベント</p>
            <p class="uc-title">正解のない選び方</p>
            <p class="uc-date">2026年5月17日（土）</p>
            <p class="uc-venue">@犬山フロイデ</p>
          </div>
          <div class="uc-right">
            <a href="#" class="btn">詳細をみる</a>
          </div>
        </div>

        <!-- マルシェ -->
        <div class="upcoming-card">
          <div class="uc-left">
            <p class="uc-type">マルシェ</p>
            <p class="uc-title">coming soon...</p>
            <p class="uc-date">2026年6月〜7月予定</p>
            <p class="uc-venue">@調整中</p>
          </div>
          <div class="uc-right">
            <a href="#" class="btn">詳細をみる</a>
          </div>
        </div>

        <!-- フェス -->
        <div class="upcoming-card">
          <div class="uc-left">
            <p class="uc-type">フェス</p>
            <p class="uc-title">coming soon...</p>
            <p class="uc-date">2026年8月予定</p>
            <p class="uc-venue">@調整中</p>
          </div>
          <div class="uc-right">
            <a href="#" class="btn">詳細をみる</a>
          </div>
        </div>

      </div>

    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <img class="footer-img" src="top-footer.svg" alt="">
    <p class="copyright">© 2026 NONBORI. All rights reserved.</p>
  </footer>

</body>
</html>
