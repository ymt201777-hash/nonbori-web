<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NONBORI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <nav class="nav-links">
      <a href="event.html"><img src="nav-event.svg" alt="EVENT"></a>
      <a href="about.html"><img src="nav-aboutus.svg" alt="ABOUT US"></a>
      <a href="contact.html"><img src="nav-contact.svg" alt="CONTACT"></a>
    </nav>
    <a href="https://www.instagram.com/nonbori_official" class="nav-instagram" target="_blank" rel="noopener noreferrer">
      <img src="nav-instagram.svg" alt="Instagram">
    </a>
  </header>

  <main>

    <!-- ===== HERO ===== -->
    <section class="hero">
      <img src="top-hero.svg" alt="NONBORI">
    </section>

    <!-- ===== WHAT IS NONBORI ===== -->
    <section class="what-is">
      <img class="section-heading" src="top-heading-whatisnonbori.svg" alt="WHAT IS NONBORI?">
      <p>
        僕らの地元、愛知県尾張地方の方言「のんぼり（鯉のぼり・布地）」が語源。<br>
        人と人を織り交ぜる——その想いを名前に込めました。<br>
        <br>
        大人になっても好きなことにまっすぐに、<br>
        こだわりを持って生きている僕たちだからこそつくれる、<br>
        大人も楽しい"遊びごころ"が感じられるイベントを創造していきます。
      </p>
    </section>

    <!-- ===== EVENT ===== -->
    <section class="event-section">
      <div class="event-circle-wrap">
        <img class="event-circle-img" src="top-event-circle.svg" alt="EVENT">
        <div class="event-cards">
          <!-- ASOBO! カード -->
          <div class="event-card main-card">
            <p class="asobo-title">ASOBO!</p>
            <p class="event-date">2026年10月4日（日）</p>
            <p class="event-venue">@みんなの森 ぎふメディアコスモス</p>
            <p class="event-tags">ファミリー向け / 子供服 , ワークショップ , フードトラック</p>
            <a href="event.html" class="btn">詳細をみる</a>
          </div>
          <!-- coming soon カード -->
          <div class="event-card coming-soon-card">
            <span class="coming-soon-text">coming soon...</span>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== ABOUT US ===== -->
    <section class="about-preview">
      <img class="section-heading" src="top-heading-aboutus.svg" alt="ABOUT US">

      <!-- YUICHIRO: 写真（左）名前（右） -->
      <div class="member-row">
        <div class="member-photo">
          <img src="circle-placeholder.svg" alt="祐一郎">
        </div>
        <div class="member-name-only">
          <img src="top-member-yuichiro.svg" alt="REPRESENTATIVE YUICHIRO">
        </div>
      </div>

      <!-- HARU: 名前（左）写真（右） -->
      <div class="member-row reverse">
        <div class="member-photo">
          <img src="photo-haru.svg" alt="はるのすけ">
        </div>
        <div class="member-name-only">
          <img src="top-member-haru.svg" alt="ART DIRECTOR HARU">
        </div>
      </div>

      <!-- MI-BO-: 写真（左）名前（右） -->
      <div class="member-row">
        <div class="member-photo">
          <img src="circle-placeholder.svg" alt="みーぼー">
        </div>
        <div class="member-name-only">
          <img src="top-member-mibo.svg" alt="MERCHANDISER MI-BO-">
        </div>
      </div>
    </section>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <img class="footer-img" src="top-footer.svg" alt="">
    <p class="copyright">© 2026 NONBORI. All rights reserved.</p>
  </footer>

</body>
</html>
