<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTACT | NONBORI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <nav class="nav-links">
      <a href="event.html"><img src="nav-event.svg" alt="EVENT"></a>
      <a href="about.html"><img src="nav-aboutus.svg" alt="ABOUT US"></a>
      <a href="contact.html"><img src="nav-contact.svg" alt="CONTACT"></a>
    </nav>
    <a href="https://www.instagram.com/nonbori_official" class="nav-instagram" target="_blank" rel="noopener noreferrer">
      <img src="nav-instagram.svg" alt="Instagram">
    </a>
  </header>

  <main>
    <section class="contact-section">

      <!-- 見出し -->
      <img class="contact-heading-img" src="contact-heading.svg" alt="お気軽にどうぞ。">

      <!-- リード文 -->
      <p class="contact-lead">
        イベント出展のご希望やコラボレーションのご相談、各種お仕事のご依頼など、<br>
        お気軽にお問い合わせください。<br>
        小さなご質問やご相談なども大歓迎です。<br>
        <br>
        お問い合わせには、通常2〜3営業日以内にご返信させていただきます。<br>
        ご連絡お待ちしております。
      </p>

      <!-- フォーム -->
      <form class="contact-form" action="#" method="post">

        <div class="form-group">
          <label class="form-label" for="name">お名前</label>
          <input class="form-input" type="text" id="name" name="name" placeholder="山田 太郎" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">メールアドレス</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="example@email.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="type">お問い合わせ種別</label>
          <select class="form-select" id="type" name="type" required>
            <option value="" disabled selected>選択してください</option>
            <option value="event">イベント出展希望</option>
            <option value="collab">コラボ・取材</option>
            <option value="work">お仕事のご依頼</option>
            <option value="other">その他</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="message">メッセージ</label>
          <textarea class="form-textarea" id="message" name="message" placeholder="お気軽にどうぞ。" required></textarea>
        </div>

        <button class="form-submit" type="submit">送信する</button>

      </form>

    </section>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <img class="footer-img" src="top-footer.svg" alt="">
    <p class="copyright">© 2026 NONBORI. All rights reserved.</p>
  </footer>

</body>
</html>
