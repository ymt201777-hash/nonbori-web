<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 検索エンジン避け: どこからもリンクせず、インデックスもさせない -->
<meta name="robots" content="noindex, nofollow">
<title>ASOBO!! ロゴアニメ 実験室</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#fafafa; color:#333;
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  padding:32px 16px 64px;
  display:flex; flex-direction:column; align-items:center;
}
h1 { font-size:20px; font-weight:700; margin-bottom:4px; }
.note { font-size:12px; color:#999; margin-bottom:32px; text-align:center; line-height:1.6; }

.grid {
  display:flex; flex-wrap:wrap; gap:24px;
  width:100%; max-width:1100px; justify-content:center;
}
.card {
  background:#fff; border:1px solid #e5e5e5; border-radius:16px;
  padding:16px; flex:1 1 480px; min-width:320px;
  box-shadow:0 4px 16px rgba(0,0,0,0.04);
  display:flex; flex-direction:column;
}
.card h2 { font-size:15px; font-weight:700; margin-bottom:12px; }
.frame-wrap {
  position:relative; width:100%;
  border:1px solid #eee; border-radius:10px; overflow:hidden; background:#fff;
}
iframe { width:100%; height:380px; border:0; display:block; }
.play-row { display:flex; gap:10px; margin-top:14px; }
button {
  cursor:pointer; font-size:14px; font-weight:600;
  padding:10px 22px; border-radius:10px; border:none;
  background:#ff0000; color:#fff; transition:opacity .15s, transform .05s;
  display:inline-flex; align-items:center; gap:8px;
}
button:hover { opacity:.88; }
button:active { transform:scale(.97); }
button .ico { font-size:12px; }
</style>
</head>
<body>
<h1>ASOBO!! ロゴアニメ 実験室</h1>
<p class="note">
  実験用ページ（非公開・どこからもリンクされていません）<br>
  ▶ 再生 ボタンでアニメーションを最初から再生します。
</p>

<div class="grid">
  <div class="card">
    <h2>① ロゴ集合アニメ（バラバラ → 集合）</h2>
    <div class="frame-wrap">
      <iframe id="frame-logo" src="../../asobo-logo-animation.html" title="logo animation"></iframe>
    </div>
    <div class="play-row">
      <button data-target="frame-logo" data-src="../../asobo-logo-animation.html">
        <span class="ico">▶</span> 再生
      </button>
    </div>
  </div>

  <div class="card">
    <h2>② キャラ ウォークイン アニメ</h2>
    <div class="frame-wrap">
      <iframe id="frame-walk" src="../../asobo-walk.html" title="walk animation"></iframe>
    </div>
    <div class="play-row">
      <button data-target="frame-walk" data-src="../../asobo-walk.html">
        <span class="ico">▶</span> 再生
      </button>
    </div>
  </div>

  <div class="card">
    <h2>③ ロゴ レッドアニメ</h2>
    <div class="frame-wrap">
      <iframe id="frame-red" src="../../logo-red-animation.html" title="logo red animation"></iframe>
    </div>
    <div class="play-row">
      <button data-target="frame-red" data-src="../../logo-red-animation.html">
        <span class="ico">▶</span> 再生
      </button>
    </div>
  </div>

  <div class="card">
    <h2>④ ロゴ レッドアニメ v2</h2>
    <div class="frame-wrap">
      <iframe id="frame-red2" src="../../logo-red-animation-v2.html" title="logo red animation v2"></iframe>
    </div>
    <div class="play-row">
      <button data-target="frame-red2" data-src="../../logo-red-animation-v2.html">
        <span class="ico">▶</span> 再生
      </button>
    </div>
  </div>
</div>

<script>
// 再生ボタン: iframe を読み込み直して、子HTMLの自動再生を頭から走らせる
let n = 0;
document.querySelectorAll('button[data-target]').forEach(btn => {
  btn.addEventListener('click', () => {
    const frame = document.getElementById(btn.dataset.target);
    n++;
    // キャッシュ無効化のためクエリを付け替えて確実にリロード
    frame.src = btn.dataset.src + '?play=' + n;
  });
});
</script>
</body>
</html>
